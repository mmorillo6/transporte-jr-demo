/* ═══ LOGIN - FIXED with useRef to avoid stale closure ═══ */
function LoginScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [shake, setShake] = useState(false);
  const pinRef = useRef("");

  const handleDigit = useCallback((digit) => {
    const next = pinRef.current + digit;
    if (next.length > 4) return;
    pinRef.current = next;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        const match = PINS[next];
        if (match) {
          onLogin({ pin: next, ...match });
        } else {
          setShake(true);
          setTimeout(() => {
            setShake(false);
            pinRef.current = "";
            setPin("");
          }, 500);
        }
      }, 200);
    }
  }, [onLogin]);

  const handleDelete = useCallback(() => {
    pinRef.current = pinRef.current.slice(0, -1);
    setPin(pinRef.current);
  }, []);

  const quickLogin = useCallback((pinCode) => {
    const match = PINS[pinCode];
    if (match) onLogin({ pin: pinCode, ...match });
  }, [onLogin]);

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100dvh", background: "linear-gradient(160deg, #111827 0%, #1F2937 50%, #0F172A 100%)", padding: 24, fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>

        <IconTruck s={28} c="white" />
      </div>
      <h1 style={{ color: "white", fontSize: 20, fontWeight: 700, margin: 0 }}>Transporte Jose Rodriguez</h1>
      <p style={{ color: "#9CA3AF", fontSize: 13, margin: "4px 0 32px" }}>Sistema de gestion - 13 camiones</p>

      <div style={{ display: "flex", gap: 12, marginBottom: 32, animation: shake ? "shake .4s" : "none" }}>
        {[0, 1, 2, 3].map(i => (
          <div key={i} style={{ width: 16, height: 16, borderRadius: "50%", background: i < pin.length ? AC : "#374151", transition: "all .15s", transform: i < pin.length ? "scale(1.2)" : "scale(1)" }} />
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, maxWidth: 240 }}>
        {[1, 2, 3, 4, 5, 6, 7, 8, 9, null, 0, "del"].map((d, i) => (
          d === null ? <div key={i} /> :
          <button key={i}
            onClick={() => d === "del" ? handleDelete() : handleDigit(String(d))}
            style={{ width: 64, height: 64, borderRadius: 32, background: d === "del" ? "transparent" : "#1F2937", border: d === "del" ? "none" : "1px solid #374151", color: "white", fontSize: d === "del" ? 16 : 24, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
            {d === "del" ? "<" : d}
          </button>
        ))}
      </div>

      <p style={{ color: "#4B5563", fontSize: 10, margin: "24px 0 8px" }}>Acceso rapido (demo):</p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", maxWidth: 360 }}>
        {Object.entries(PINS).map(([code, u]) => (
          <button key={code} onClick={() => quickLogin(code)}
            style={{ background: "#1F2937", border: "1px solid #374151", borderRadius: 10, padding: "6px 12px", color: "#9CA3AF", fontSize: 10, cursor: "pointer" }}>
            <span style={{ color: "white", fontWeight: 600 }}>{u.sub}</span><br />PIN: {code}
          </button>
        ))}
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

/* ═══ PARTNER VIEW ═══ */
function PartnerView({ user }) {
  const partner = PARTNERS[user.pin];
  if (!partner) return <p style={{ padding: 20, color: "#6B7280" }}>No se encontraron camiones para este usuario.</p>;

  const myTrucks = partner.plates.map(p => {
    const tk = gt(p);
    const b = BOARD.find(x => x.p === p);
    const tl = TIMELINE[p] || [];
    const gastos = GASTOS[p] || [];
    const totalRev = b?.aR || 0;
    const totalExp = gastos.reduce((s, g) => s + g.am, 0);
    const isAf = tk?.t === "A";
    const admin = isAf ? totalRev * 0.10 : 0;
    const npr = isAf ? 0 : totalRev * 0.05;
    const fixed = isAf ? 0 : 165;
    const nC = (b?.aT || 0) * 11;
    const totalDed = totalExp + nC + admin + npr + fixed;
    const saldo = totalRev - totalDed;
    const tix = TIX.filter(t => t.p === p);
    return { tk, b, tl, gastos, totalRev, totalExp, totalDed, saldo, isAf, admin, tix };
  });

  return (
    <div>
      <h2 style={{ fontSize: 20, fontWeight: 700, margin: "0 0 4px" }}>Mis camiones</h2>
      <p style={{ fontSize: 12, color: "#9CA3AF", margin: "0 0 16px" }}>{partner.name} - {partner.plates.length} camion{partner.plates.length > 1 ? "es" : ""}</p>

      {myTrucks.map(({ tk, b, tl, gastos, totalRev, totalDed, saldo, isAf, admin, tix }, idx) => (
        <div key={tk.p} style={{ marginBottom: idx < myTrucks.length - 1 ? 24 : 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <div style={{ width: 44, height: 44, borderRadius: 14, background: tk.c, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 12, fontWeight: 700 }}>{tk.a.slice(0, 3)}</div>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontWeight: 700, fontSize: 16 }}>{tk.a}</span>
                {isAf && <span style={{ fontSize: 8, fontWeight: 700, padding: "2px 6px", borderRadius: 4, background: "#FEF3C7", color: "#92400e" }}>AFILIADO</span>}
              </div>
              <p style={{ fontSize: 12, color: "#6B7280", margin: 0 }}>{tk.d} - {tk.p}</p>
            </div>
            <div style={{ padding: "4px 10px", borderRadius: 8, background: b?.st === "activo" ? "#DCFCE7" : b?.st === "inactivo" ? "#FEF3C7" : "#F3F4F6" }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: b?.st === "activo" ? "#15803d" : b?.st === "inactivo" ? "#92400e" : "#6B7280" }}>{(b?.st || "N/A").toUpperCase()}</span>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
            <div style={{ background: "#ECFDF5", borderRadius: 14, padding: 10, textAlign: "center" }}><p style={{ fontSize: 9, color: "#059669", margin: 0 }}>Facturado</p><p style={{ fontSize: 16, fontWeight: 700, color: "#059669", margin: 0 }}>{$(totalRev)}</p></div>
            <div style={{ background: "#FEF2F2", borderRadius: 14, padding: 10, textAlign: "center" }}><p style={{ fontSize: 9, color: "#DC2626", margin: 0 }}>Deducciones</p><p style={{ fontSize: 16, fontWeight: 700, color: "#DC2626", margin: 0 }}>{$(totalDed)}</p></div>
            <div style={{ background: saldo >= 0 ? "#F0FDF4" : "#FEF2F2", borderRadius: 14, padding: 10, textAlign: "center" }}><p style={{ fontSize: 9, color: saldo >= 0 ? "#059669" : "#DC2626", margin: 0 }}>Saldo</p><p style={{ fontSize: 16, fontWeight: 700, color: saldo >= 0 ? "#059669" : "#DC2626", margin: 0 }}>{$(saldo)}</p></div>
          </div>

          {isAf && <div style={{ background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 12, padding: "8px 12px", marginBottom: 12, fontSize: 11, color: "#92400e" }}>Comision administrativa 10%: {$(admin)}</div>}

          {tix.length > 0 && <div style={{ background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 14, padding: 12, marginBottom: 12 }}>
            <p style={{ fontSize: 10, fontWeight: 700, color: "#DC2626", margin: "0 0 6px" }}>EN TALLER</p>
            {tix.map(t => <div key={t.id}><p style={{ fontSize: 12, fontWeight: 600, margin: 0 }}>{t.prob}</p><p style={{ fontSize: 10, color: "#6B7280", margin: "2px 0 4px" }}>Mecanico: {t.mec}</p>{t.parts.map((p, i) => <div key={i} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, marginBottom: 2 }}><Dot color={p.st === "needed" ? "#EF4444" : p.st === "ordered" ? "#F59E0B" : "#10B981"} size={6} />{p.qty}x {p.name} - <span style={{ fontWeight: 600 }}>{p.st === "needed" ? "Falta" : p.st === "ordered" ? "Pedido" : "Listo"}</span></div>)}</div>)}
          </div>}

          <p style={{ fontSize: 10, fontWeight: 700, color: "#6B7280", textTransform: "uppercase", margin: "0 0 6px" }}>Viajes esta quincena</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 12 }}>
            {tl.length > 0 ? tl.map((v, i) => (
              <div key={i} style={{ background: "white", borderRadius: 10, border: "1px solid #F3F4F6", padding: "6px 10px", display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#374151", width: 36 }}>{v.dt}</span>
                <div style={{ flex: 1 }}><p style={{ fontSize: 11, margin: 0 }}>{v.ms}</p><p style={{ fontSize: 9, color: "#9CA3AF", margin: 0 }}>{v.tr}v - {v.tons.toFixed(0)}t</p></div>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#059669" }}>{$(v.rev)}</span>
              </div>
            )) : <p style={{ fontSize: 11, color: "#9CA3AF" }}>Sin viajes registrados</p>}
          </div>

          {gastos.length > 0 && <>
            <p style={{ fontSize: 10, fontWeight: 700, color: "#6B7280", textTransform: "uppercase", margin: "0 0 6px" }}>Gastos cargados</p>
            {gastos.map((g, i) => <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, padding: "4px 0", borderBottom: "1px solid #F3F4F6" }}><span><span style={{ color: "#9CA3AF" }}>{g.dt} </span>{g.d}</span><span style={{ fontWeight: 600, color: "#DC2626" }}>{$(g.am)}</span></div>)}
          </>}

          {idx < myTrucks.length - 1 && <hr style={{ border: "none", borderTop: "2px solid #E5E7EB", margin: "20px 0 0" }} />}
        </div>
      ))}

      <div style={{ background: "#F0F9FF", border: "1px solid #BAE6FD", borderRadius: 16, padding: 14, marginTop: 16 }}>
        <p style={{ fontSize: 12, fontWeight: 600, color: "#0369A1", margin: "0 0 4px" }}>Tu vista de socio incluye:</p>
        <p style={{ fontSize: 11, color: "#6B7280", margin: 0, lineHeight: 1.6 }}>
          Timeline de viajes dia a dia<br />
          Gastos cargados a tu camion<br />
          Saldo neto (facturacion - deducciones)<br />
          Estado del camion (activo / taller / parado)<br />
          Repuestos pendientes si esta en taller<br />
          <strong>No necesitas llamar al encargado</strong>
        </p>
      </div>
    </div>
  );
}

/* ═══ MAIN ═══ */
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("home");

  if (!user) return <LoginScreen onLogin={u => { setUser(u); setPage("home"); }} />;

  const NAV = {
    admin: [
      { id: "home", l: "Hoy", Icon: IconHome },
      { id: "viajes", l: "Viajes", Icon: IconTruck },
      { id: "gastos", l: "Gastos", Icon: IconDollar },
      { id: "taller", l: "Taller", Icon: IconWrench },
      { id: "mas", l: "Mas", Icon: IconMore },
    ],
    mechanic: [{ id: "home", l: "Taller", Icon: IconWrench }],
    partner: [{ id: "home", l: "Mi camion", Icon: IconTruck }],
    viewer: [{ id: "home", l: "Resumen", Icon: IconHome }],
  };
  const navItems = NAV[user.role] || NAV.viewer;

  const DEMO_BUTTONS = [
    { l: "Encargado", pin: "1234" },
    { l: "Mecanico", pin: "5678" },
    { l: "Dueno", pin: "0000" },
    { l: "Socio Leo", pin: "1001" },
    { l: "Socio Neto", pin: "1007" },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100dvh", background: "#F9FAFB", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", overflow: "hidden" }}>
      {/* Demo role switcher */}
      <div style={{ background: "#1E293B", padding: "5px 10px", display: "flex", alignItems: "center", gap: 4, flexShrink: 0, overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        <span style={{ fontSize: 8, color: "#64748B", fontWeight: 600, flexShrink: 0 }}>DEMO</span>
        {DEMO_BUTTONS.map(r => (
          <button key={r.pin}
            onClick={() => { const p = PINS[r.pin]; if (p) { setUser({ pin: r.pin, ...p }); setPage("home"); } }}
            style={{ background: user.pin === r.pin ? AC : "#334155", border: "none", borderRadius: 6, padding: "3px 8px", fontSize: 9, fontWeight: 600, color: "white", cursor: "pointer", flexShrink: 0, whiteSpace: "nowrap" }}>
            {r.l}
          </button>
        ))}
        <button onClick={() => setUser(null)} style={{ background: "none", border: "none", color: "#475569", fontSize: 9, cursor: "pointer", marginLeft: "auto", flexShrink: 0 }}>Salir</button>
      </div>

      {/* Header */}
      <header style={{ background: "#111827", color: "white", padding: "8px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <div>
          <h1 style={{ fontSize: 13, fontWeight: 700, margin: 0 }}>Transporte Jose Rodriguez</h1>
          <p style={{ fontSize: 10, color: "#FBBF24", fontWeight: 600, margin: 0 }}>{user.name} - {user.sub}</p>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#34D399" }} />
          <span style={{ fontSize: 10, color: "#6B7280" }}>13</span>
        </div>
      </header>

      {/* Content */}
      <main style={{ flex: 1, overflow: "auto", padding: 14, WebkitOverflowScrolling: "touch" }}>
        {user.role === "admin" && <AdminView page={page} setPage={setPage} />}
        {user.role === "mechanic" && <MechanicView />}
        {user.role === "viewer" && <ViewerView />}
        {user.role === "partner" && <PartnerView user={user} />}
      </main>

      {/* Nav */}
      <nav style={{ background: "white", borderTop: "1px solid #F3F4F6", display: "grid", gridTemplateColumns: `repeat(${navItems.length}, 1fr)`, flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {navItems.map(n => (
          <button key={n.id} onClick={() => setPage(n.id)}
            style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "10px 0 8px", background: "none", border: "none", color: (page === n.id || (n.id === "mas" && ["nomina","fiados","prestamos","caja","deuda","relacion","despacho","whatsapp","comparar","tco"].includes(page))) ? AC : "#9CA3AF", cursor: "pointer" }}>
            <n.Icon s={22} c={(page === n.id || (n.id === "mas" && ["nomina","fiados","prestamos","caja","deuda","relacion","despacho","whatsapp","comparar","tco"].includes(page))) ? AC : "#9CA3AF"} />
            <span style={{ fontSize: 10, fontWeight: 600 }}>{n.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
